name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Share what you want to achieve. If there is an existing issue or discussion, link it below.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What limitation or workflow do you want to improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How should the plugin behave instead? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you have solved this or workarounds today.
    validations:
      required: false
