name: Bug report
description: Report something that does not work as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in what you can; the more detail, the easier it is to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true
  - type: input
    id: qgis-version
    attributes:
      label: QGIS version
      description: e.g. 3.44.0 — Help → About QGIS
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: ICEYE plugin version (if known)
      description: Plugin Manager or metadata version
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps from a clean QGIS session if possible.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Python log, QGIS message log, or screenshots if helpful.
    validations:
      required: false
